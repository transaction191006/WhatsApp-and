<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --wa-green: #075E54; --wa-bg: #ffffff; }
        body { margin: 0; font-family: sans-serif; background: var(--wa-bg); }
        .header {
            background: var(--wa-green); color: white;
            padding-top: env(safe-area-inset-top); /* Space for the notch */
            position: sticky; top: 0;
        }
        .top-row { padding: 15px; font-size: 20px; display: flex; justify-content: space-between; }
        .tabs { display: flex; justify-content: space-around; padding-bottom: 10px; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .tab-active { border-bottom: 3px solid white; padding-bottom: 5px; }
        .fab {
            position: fixed; bottom: 30px; right: 20px;
            width: 60px; height: 60px; background: #25D366;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: white; font-size: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="main-screen">
        <div class="header">
            <div class="top-row"><span>WhatsApp</span><span>🔍 ⋮</span></div>
            <div class="tabs">
                <div class="tab-active">Chats</div>
                <div style="opacity:0.6">Updates</div>
                <div style="opacity:0.6">Calls</div>
            </div>
        </div>
        
        <div class="chat-item" onclick="openChat('Alex')">
            <div class="avatar"></div>
            <div>
                <div style="font-weight:bold">Alex</div>
                <div style="color:gray; font-size:14px">See you at the park?</div>
            </div>
        </div>
    </div>

    <div id="chat-screen" style="display:none; height:100vh; flex-direction:column;">
        <div class="header" style="display:flex; align-items:center; padding: 10px;">
            <span onclick="closeChat()" style="margin-right:10px; font-size:24px">←</span>
            <div class="avatar" style="width:35px; height:35px"></div>
            <span id="chat-name" style="font-weight:bold">Name</span>
        </div>
        
        <div id="message-area" style="flex:1; background:#e5ddd5; padding:15px; overflow-y:auto;">
            </div>

        <div style="padding:10px; display:flex; background:#fff;">
            <input id="msg-input" type="text" placeholder="Type a message" style="flex:1; border-radius:20px; border:1px solid #ccc; padding:10px;">
            <button onclick="sendMessage()" style="background:var(--wa-green); color:white; border:none; border-radius:50%; width:45px; margin-left:5px">></button>
        </div>
    </div>

    <script>
        // Logic to switch screens
        function openChat(name) {
            document.getElementById('main-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('chat-name').innerText = name;
        }

        function closeChat() {
            document.getElementById('main-screen').style.display = 'block';
            document.getElementById('chat-screen').style.display = 'none';
        }

        function sendMessage() {
            let input = document.getElementById('msg-input');
            if(input.value !== "") {
                let area = document.getElementById('message-area');
                area.innerHTML += `<div style="background:#dcf8c6; padding:8px; margin:5px; align-self:flex-end; border-radius:10px; max-width:70%; float:right; clear:both;">${input.value}</div>`;
                input.value = "";
                area.scrollTop = area.scrollHeight;
            }
        }
    </script>
</body>
