<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --wa-green: #075E54; --wa-bg: #ffffff; }
        body { margin: 0; font-family: sans-serif; background: var(--wa-bg); }
        .header {
            background: var(--wa-green); color: white;
            padding-top: env(safe-area-inset-top); /* Space for the notch */
            position: sticky; top: 0;
        }
        .top-row { padding: 15px; font-size: 20px; display: flex; justify-content: space-between; }
        .tabs { display: flex; justify-content: space-around; padding-bottom: 10px; font-weight: bold; text-transform: uppercase; font-size: 13px; }
        .tab-active { border-bottom: 3px solid white; padding-bottom: 5px; }
        .fab {
            position: fixed; bottom: 30px; right: 20px;
            width: 60px; height: 60px; background: #25D366;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: white; font-size: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="top-row"><span>WhatsApp</span><span>🔍 ⋮</span></div>
        <div class="tabs">
            <div class="tab-active">Chats</div>
            <div style="opacity:0.6">Updates</div>
            <div style="opacity:0.6">Calls</div>
        </div>
    </div>
    <div style="padding: 20px; color: gray;">No chats yet. Start a conversation!</div>
    <div class="fab">+</div>
</body>
</html>
